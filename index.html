<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dafiny</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Raleway:ital,wght@0,200;0,300;0,400;1,200;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --brown-dark:   #5c3d2e;
      --brown-mid:    #8b5e3c;
      --brown-light:  #c49a6c;
      --cream:        #f5f0e8;
      --off-white:    #faf7f2;
      --text-dark:    #3b2a1a;
      --text-mid:     #6b4f35;
    }

    body {
      min-height: 100vh;
      background: var(--off-white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Raleway', sans-serif;
      padding: 40px 20px 60px;
    }

    /* Subtle warm grain texture via SVG */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, #d4a97420 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, #c49a6c18 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Profile ── */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 28px;
    }

    .avatar-ring {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, var(--brown-mid), var(--brown-light), var(--brown-dark));
      box-shadow: 0 4px 20px rgba(92, 61, 46, 0.25);
      margin-bottom: 16px;
    }

    .avatar-ring img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 3px solid var(--off-white);
      transition: transform 0.35s ease;
    }

    .avatar-ring:hover img {
      transform: scale(1.05);
    }

    .profile-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 600;
      color: var(--brown-dark);
      letter-spacing: 0.04em;
    }

    .profile-tagline {
      font-size: 0.78rem;
      font-weight: 200;
      color: var(--text-mid);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-style: italic;
      margin-top: 4px;
    }

    /* ── Staircase links ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text-dark);
      background: var(--cream);
      border: 1px solid rgba(139, 94, 60, 0.18);
      border-radius: 14px;
      padding: 14px 22px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .link-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 60%, rgba(196, 154, 108, 0.12));
      pointer-events: none;
    }

    .link-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(92, 61, 46, 0.18);
      background: #ede5d8;
    }

    /* Staircase widths */
    .link-card:nth-child(1) { width: 100%; }
    .link-card:nth-child(2) { width: 93%; }
    .link-card:nth-child(3) { width: 86%; }
    .link-card:nth-child(4) { width: 79%; }
    .link-card:nth-child(5) { width: 72%; }
    .link-card:nth-child(6) { width: 65%; }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--brown-mid), var(--brown-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg {
      width: 18px;
      height: 18px;
      fill: var(--off-white);
    }

    .link-text {
      display: flex;
      flex-direction: column;
    }

    .link-label {
      font-size: 0.72rem;
      font-weight: 200;
      color: var(--text-mid);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-style: italic;
    }

    .link-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.08rem;
      font-weight: 500;
      color: var(--text-dark);
      letter-spacing: 0.04em;
    }

    /* disabled card (TikTok) */
    .link-card.soon {
      opacity: 0.55;
      cursor: default;
      pointer-events: none;
    }

    .soon-badge {
      margin-left: auto;
      font-size: 0.68rem;
      font-weight: 400;
      color: var(--brown-mid);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(139, 94, 60, 0.1);
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 36px;
      font-size: 0.72rem;
      font-weight: 300;
      color: rgba(107, 79, 53, 0.5);
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
